workflows:
  ios-release:
    name: iOS Release
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build iOS app
        script: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../Runner.ipa Payload/
          cd ../../../
    artifacts:
      - Runner.ipa
    publishing:
      email:
        recipients:
          - alexkyeyune444@gmail.com