
name: movie_app
description: A modern movie discovery app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.0.2
  dio: ^5.4.3+1
  json_annotation: ^4.8.1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  glassmorphism: ^3.0.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  equatable: ^2.0.5
  url_launcher: ^6.2.6
  flutter_ios_preview: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/
